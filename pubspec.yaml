name: mind_gym_book
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.5.1
  http: ^1.3.0
  webview_flutter: ^4.10.0
  image_picker: ^1.0.7
  url_launcher: ^6.3.2
  
  # EPUB & Downloading
  epub_view: ^3.2.0
  dio: ^5.7.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.1
  speech_to_text: ^7.3.0
  syncfusion_flutter_pdfviewer: ^32.2.4
  intl: ^0.20.2
  razorpay_flutter: ^1.4.1
  flutter_tts: ^4.2.5
  flutter_pdf_flipbook: ^1.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.11.0


flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/mgb_logo.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/mgb_logo.jpeg"
    

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
